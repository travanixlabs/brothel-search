<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brothel Search – Browse Profiles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#b44aff;--accent2:#ff6f00;--gold:#c9952c;--gold-light:#f5e6a3;--bg-dark:#0a0a0f;--bg-card:rgba(255,255,255,0.06);--bg-card-hover:rgba(255,255,255,0.09);--text:#e0e0e0;--text-dim:#888;--border-subtle:rgba(255,255,255,0.1)}
body{background:var(--bg-dark);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:-10%;width:120%;height:120%;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(180,74,255,0.06),transparent),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,111,0,0.04),transparent),radial-gradient(ellipse 50% 50% at 50% 50%,rgba(201,149,44,0.03),transparent);pointer-events:none;z-index:0;animation:atmosphereDrift 30s ease-in-out infinite}
@keyframes atmosphereDrift{0%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,20px) scale(1.03)}50%{transform:translate(-20px,10px) scale(1.01)}75%{transform:translate(10px,-25px) scale(1.04)}100%{transform:translate(0,0) scale(1)}}

/* Nav */
nav{position:fixed;top:0;left:0;width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:70px;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
nav::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(180,74,255,0.4) 20%,rgba(201,149,44,0.5) 50%,rgba(180,74,255,0.4) 80%,transparent 100%);background-size:200% 100%;animation:navGlow 8s ease infinite}
@keyframes navGlow{0%{background-position:0% 0}50%{background-position:100% 0}100%{background-position:0% 0}}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:26px;letter-spacing:5px;text-transform:uppercase;background:linear-gradient(135deg,#c9952c,#f5e6a3,#c9952c,#e1b97e,#f5e6a3,#c9952c);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 4s ease infinite;filter:drop-shadow(0 0 8px rgba(201,149,44,0.4));cursor:pointer}
@keyframes goldShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* Search */
.search-input{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;padding:8px 14px;outline:none;transition:border-color .3s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text-dim)}

/* Section */
.section{padding:100px 2.5%;padding-top:152px;max-width:95%;margin:0 auto;position:relative;z-index:1}
.section-header{display:flex;align-items:center;gap:20px;margin-bottom:40px;flex-wrap:wrap}
.section-line{width:60px;height:2px;background:linear-gradient(90deg,var(--accent),rgba(180,74,255,0.2))}
.section-tag{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--gold)}
.section-title{font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(28px,4vw,48px);letter-spacing:4px;text-transform:uppercase;color:#fff}

/* Filter section */
.filter-sort-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.filter-section{flex:1;min-width:0}
.filter-section-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.filter-row{display:flex;gap:16px;flex-wrap:wrap}
.sort-section-inline{flex-shrink:0}
.sort-section-inline .filter-section-title{text-align:right}
.sort-section-inline .sort-row{justify-content:flex-end}

/* Dropdown filter */
.filter-dropdown{position:relative;min-width:200px;flex:1;max-width:320px}
.filter-dropdown-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(201,149,44,0.25),rgba(201,149,44,0.1));border:1px solid rgba(201,149,44,0.4);color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:12px 18px;cursor:pointer;transition:all .3s}
.filter-dropdown-btn:hover{background:linear-gradient(135deg,rgba(201,149,44,0.35),rgba(201,149,44,0.15));border-color:var(--gold)}
.filter-dropdown-btn.has-selection{border-color:var(--accent);background:linear-gradient(135deg,rgba(180,74,255,0.2),rgba(180,74,255,0.08))}
.filter-dropdown-btn svg{width:16px;height:16px;fill:currentColor;transition:transform .2s;flex-shrink:0}
.filter-dropdown-btn.open svg{transform:rotate(180deg)}
.filter-dropdown-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;width:100%;background:#1a1a24;border:1px solid rgba(201,149,44,0.3);z-index:50;max-height:300px;overflow-y:auto;padding:8px 0}
.filter-dropdown-panel.open{display:block}
.filter-option{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:1px;padding:9px 16px;cursor:pointer;transition:all .2s;text-align:left}
.filter-option:hover{background:rgba(255,255,255,0.04);color:#fff}
.filter-option.active{color:var(--accent)}
.filter-checkbox{width:16px;height:16px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.filter-option.active .filter-checkbox{border-color:var(--accent);background:rgba(180,74,255,0.2)}
.filter-option.active .filter-checkbox::after{content:'';width:8px;height:8px;background:var(--accent)}
.filter-option-count{margin-left:auto;font-size:12px;color:var(--text-dim);opacity:.6}
.label-toggle{display:flex;gap:0;margin-left:auto;flex-shrink:0}
.label-toggle-btn{width:26px;height:22px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.03);color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;padding:0}
.label-toggle-btn:first-child{border-right:none}
.label-toggle-btn.active-include{background:rgba(0,200,100,0.2);border-color:#00c864;color:#00c864}
.label-toggle-btn.active-exclude{background:rgba(255,60,60,0.2);border-color:#ff3c3c;color:#ff3c3c}
.label-toggle-btn:hover{background:rgba(255,255,255,0.08)}
.filter-option.included{color:#00c864}
.filter-option.included .filter-checkbox{border-color:#00c864;background:rgba(0,200,100,0.2)}
.filter-option.included .filter-checkbox::after{content:'';width:8px;height:8px;background:#00c864}
.filter-option.excluded{color:#ff3c3c}
.filter-option.excluded .filter-checkbox{border-color:#ff3c3c;background:rgba(255,60,60,0.2)}
.filter-option.excluded .filter-checkbox::after{content:'';width:8px;height:8px;background:#ff3c3c}

/* Clear all button */
.clear-all-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:12px 18px;cursor:pointer;transition:all .3s;white-space:nowrap;align-self:flex-end}
.clear-all-btn:hover{border-color:var(--accent);color:var(--accent)}

/* More filters */
.more-filters-section{margin-bottom:24px}
.more-filters-toggle{display:flex;align-items:center;justify-content:center;gap:8px;background:none;border:1px solid rgba(201,149,44,0.3);color:var(--gold);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;padding:10px 24px;cursor:pointer;transition:all .3s;margin:0 auto 16px}
.more-filters-toggle:hover{background:rgba(201,149,44,0.08);border-color:var(--gold)}
.more-filters-toggle svg{width:14px;height:14px;fill:currentColor;transition:transform .2s}
.more-filters-toggle.open svg{transform:rotate(180deg)}
.more-filters-panel{display:none;width:95%;margin:0 auto}
.more-filters-panel.open{display:block}
.range-filter{margin-bottom:20px;padding:0 8px}
.range-filter-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase}
.range-filter-label span:first-child{color:var(--text-dim)}
.range-filter-label span:last-child{color:var(--accent);font-weight:600}
.range-slider{position:relative;height:36px;display:flex;align-items:center}
.range-slider-track{position:absolute;left:0;right:0;height:4px;background:rgba(255,255,255,0.08);border-radius:2px}
.range-slider-fill{position:absolute;height:4px;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px}
.range-slider input[type=range]{position:absolute;width:100%;height:36px;-webkit-appearance:none;appearance:none;background:none;pointer-events:none;margin:0}
.range-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8a2be2);border:2px solid #fff;cursor:pointer;pointer-events:auto;box-shadow:0 0 8px rgba(180,74,255,0.4);position:relative;z-index:2}
.range-slider input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8a2be2);border:2px solid #fff;cursor:pointer;pointer-events:auto;box-shadow:0 0 8px rgba(180,74,255,0.4)}
.range-slider input[type=range]::-webkit-slider-runnable-track{height:4px;background:transparent}
.range-slider input[type=range]::-moz-range-track{height:4px;background:transparent}
.text-filters-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:16px 32px;width:100%;margin-bottom:24px}
.text-filters-grid .search-input{width:100%;box-sizing:border-box}
.range-filters-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:16px 32px;width:100%}
@media(max-width:600px){.text-filters-grid{grid-template-columns:1fr}.range-filters-grid{grid-template-columns:1fr}}

/* Sort section */
.sort-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.sort-dir-btn{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(201,149,44,0.25),rgba(201,149,44,0.1));border:1px solid rgba(201,149,44,0.4);color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:12px 18px;cursor:pointer;transition:all .3s;min-width:120px;justify-content:center}
.sort-dir-btn:hover{background:linear-gradient(135deg,rgba(201,149,44,0.35),rgba(201,149,44,0.15));border-color:var(--gold)}
.sort-dir-btn svg{width:16px;height:16px;fill:currentColor;transition:transform .2s}
.sort-dir-btn.desc svg{transform:rotate(180deg)}

/* Grid */
.girls-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}

/* Card */
.girl-card{background:var(--bg-card);border:1px solid rgba(255,255,255,0.06);overflow:hidden;cursor:pointer;transition:all .3s;clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));position:relative}
.girl-card:hover{border-color:rgba(180,74,255,0.3);background:var(--bg-card-hover);transform:translateY(-4px)}
.card-img{position:relative;background:linear-gradient(135deg,rgba(180,74,255,0.06),rgba(255,111,0,0.03))}
.card-thumb{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;transition:opacity .4s}
.card-info{padding:16px}
.card-name{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:#fff;text-transform:uppercase;margin-bottom:4px}
.card-venue{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;padding:2px 8px;display:inline-block;border:1px solid;clip-path:polygon(0 0,calc(100% - 4px) 0,100% 4px,100% 100%,4px 100%,0 calc(100% - 4px))}
.card-venue.ginzaempire{color:var(--accent);border-color:var(--accent);background:rgba(180,74,255,0.1)}
.card-venue.ginzaclub{color:#00c864;border-color:#00c864;background:rgba(0,200,100,0.1)}
.card-country{font-size:13px;color:var(--text-dim);letter-spacing:1px;margin-bottom:4px}
.card-special{font-size:12px;color:var(--accent2);letter-spacing:1px;margin-bottom:4px}
.card-stats{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text-dim);letter-spacing:.5px;margin-top:6px}
.card-stats span{white-space:nowrap}
.card-rates{font-size:12px;color:var(--gold);letter-spacing:1px;margin-top:4px}
.card-labels{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.card-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--text-dim)}
.card-hover-line{position:absolute;bottom:0;left:0;width:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s}
.girl-card:hover .card-hover-line{width:100%}
.card-last-rostered{font-size:11px;color:var(--text-dim);margin-top:4px}

/* Silhouette */
.silhouette{width:100%;aspect-ratio:3/4;background:linear-gradient(135deg,rgba(180,74,255,0.08),rgba(255,111,0,0.04));display:flex;align-items:center;justify-content:center}

/* Profile overlay */
.profile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;overflow-y:auto;padding:40px}
.profile-overlay.active{display:block}
.profile-panel{max-width:900px;margin:0 auto;background:#13131e;border:1px solid rgba(255,255,255,0.1);padding:40px;position:relative}
.profile-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-dim);font-size:28px;cursor:pointer;transition:color .3s}
.profile-close:hover{color:#fff}
.profile-layout{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:20px}
.profile-gallery img{width:100%;aspect-ratio:3/4;object-fit:cover;margin-bottom:8px}
.profile-thumbs{display:flex;gap:6px;flex-wrap:wrap}
.profile-thumbs img{width:60px;height:60px;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:border-color .3s}
.profile-thumbs img:hover,.profile-thumbs img.active{border-color:var(--accent)}
.profile-name{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:700;letter-spacing:3px;color:#fff;text-transform:uppercase;margin-bottom:8px}
.profile-detail{margin-bottom:20px}
.profile-detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:14px}
.profile-detail-row span:first-child{color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;font-size:12px}
.profile-desc{font-size:14px;line-height:1.7;color:var(--text);margin-top:20px}

/* Result count */
.result-count{font-size:13px;color:var(--text-dim);letter-spacing:1px;margin-bottom:16px}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--text-dim);font-size:16px;letter-spacing:2px}

/* Empty */
.empty-msg{text-align:center;padding:60px;color:var(--text-dim);font-size:16px;letter-spacing:2px}

/* Back to top */
.back-to-top{position:fixed;bottom:30px;right:30px;background:rgba(180,74,255,0.15);border:1px solid var(--accent);color:var(--accent);width:44px;height:44px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:90;transition:all .3s;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.back-to-top:hover{background:rgba(180,74,255,0.3)}
.back-to-top.visible{display:flex}

/* Footer */
footer{text-align:center;padding:40px;font-size:12px;color:var(--text-dim);letter-spacing:2px;border-top:1px solid rgba(255,255,255,0.06)}

/* Responsive */
@media(max-width:768px){
  nav{padding:0 16px;height:60px}
  .logo{font-size:16px;letter-spacing:3px}
  .search-input{font-size:13px;padding:6px 10px}
  .section{padding:80px 16px;padding-top:100px}
  .section-title{font-size:24px;letter-spacing:2px}
  .girls-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .profile-layout{grid-template-columns:1fr}
  .profile-panel{padding:20px}
  .profile-overlay{padding:16px}
}
@media(max-width:480px){
  .girls-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .card-info{padding:10px}
  .card-name{font-size:12px}
}
</style>
</head>
<body>

<nav>
<div class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">Brothel Search</div>
</nav>

<section class="section">
<div class="section-header">
<div class="section-line"></div>
<div>
<div class="section-tag">Browse</div>
<div class="section-title">All Girls</div>
</div>
</div>

<div class="filter-sort-bar">
<div class="filter-section">
<div class="filter-section-title">Filter By</div>
<div class="filter-row" id="filterRow"></div>
</div>
<div class="sort-section-inline">
<div class="filter-section-title">Sort By</div>
<div class="sort-row" id="sortRow"></div>
</div>
</div>
<div class="more-filters-section">
<button class="more-filters-toggle" id="moreFiltersToggle">More Filters <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></button>
<div class="more-filters-panel" id="moreFiltersPanel">
<div class="text-filters-grid" id="moreFiltersDropdowns"></div>
<div class="range-filters-grid" id="rangeFiltersGrid"></div>
</div>
</div>
<div class="result-count" id="resultCount"></div>
<div class="girls-grid" id="girlsGrid"><div class="loading">Loading profiles...</div></div>
</section>

<div class="profile-overlay" id="profileOverlay">
<div class="profile-panel" id="profilePanel"></div>
</div>

<button class="back-to-top" id="backToTop" title="Back to top">
<svg viewBox="0 0 24 24" width="16" height="16"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z" fill="currentColor"/></svg>
</button>

<footer>Brothel Search &copy; 2026</footer>

<script>
const PROFILES_BASE = 'https://raw.githubusercontent.com/travanixlabs/brothel-search/main/profiles';
const VENUES = [
  { id: 'ginzaempire', name: 'Ginza Empire', file: 'ginzaempire/ginzaempire.json' },
  { id: 'ginzaclub', name: 'Ginza Club', file: 'ginzaclub/ginzaclub.json' }
];

let allGirls = [];
let activeVenue = null;
let activeCountry = null;
let activeLabels = { include: [], exclude: [] };
let rangeFilters = {};
let rangeDefaults = {};
let activeSort = 'name';
let sortDir = 'asc';
let searchTimer;
const textFilters = { name: '', exp: '', special: '', lang: '', type: '', desc: '' };

const RANGE_DEFS = [
  { key: 'age', label: 'Age', field: 'age', type: 'num' },
  { key: 'body', label: 'Body', field: 'body', type: 'num' },
  { key: 'height', label: 'Height', field: 'height', type: 'num', suffix: 'cm' },
  { key: 'cup', label: 'Cup', field: 'cup', type: 'cup' },
  { key: 'val1', label: '30 Min', field: 'val1', type: 'num', prefix: '$' },
  { key: 'val2', label: '45 Min', field: 'val2', type: 'num', prefix: '$' },
  { key: 'val3', label: '60 Min', field: 'val3', type: 'num', prefix: '$' },
  { key: 'startDate', label: 'Start Date', field: 'startDate', type: 'date' },
  { key: 'lastRostered', label: 'Last Rostered', field: 'lastRostered', type: 'date' }
];
const CUP_ORDER = ['A','B','C','D','DD','E','F','G','H'];
function cupToNum(c) { const i = CUP_ORDER.indexOf((c||'').toUpperCase()); return i >= 0 ? i : -1; }
function numToCup(n) { return CUP_ORDER[n] || ''; }
function dateToNum(d) { return d ? new Date(d + 'T00:00:00').getTime() : NaN; }
function numToDate(n) { const d = new Date(n); return d.toISOString().slice(0,10); }

async function loadProfiles() {
  const results = await Promise.allSettled(
    VENUES.map(async v => {
      const r = await fetch(`${PROFILES_BASE}/${v.file}`);
      if (!r.ok) return [];
      const data = await r.json();
      return (data.girls || []).map(g => ({ ...g, venue: v.id, venueName: v.name }));
    })
  );
  allGirls = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
  renderFilters();
  renderRangeFilters();
  renderGrid();
}

function closeAllDropdowns(except) {
  document.querySelectorAll('.filter-dropdown-btn.open').forEach(b => { if (b !== except) b.classList.remove('open') });
  document.querySelectorAll('.filter-dropdown-panel.open').forEach(p => { if (p.previousElementSibling !== except) p.classList.remove('open') });
}
document.addEventListener('click', e => { if (!e.target.closest('.filter-dropdown') && !e.target.closest('.sort-dir-btn')) closeAllDropdowns() });

function hasAnyFilter() {
  const hasRangeActive = Object.keys(rangeFilters).some(k => { const d = rangeDefaults[k]; return d && (rangeFilters[k].min > d.min || rangeFilters[k].max < d.max); });
  const hasTextFilter = Object.values(textFilters).some(v => v);
  return activeVenue || activeCountry || activeLabels.include.length || activeLabels.exclude.length || hasRangeActive || hasTextFilter;
}

function updateClearBtn() {
  const fr = document.getElementById('filterRow');
  const existing = document.getElementById('clearAllBtn');
  if (hasAnyFilter() && !existing) {
    const btn = document.createElement('button');
    btn.className = 'clear-all-btn';
    btn.id = 'clearAllBtn';
    btn.textContent = 'Clear All';
    btn.onclick = () => { activeVenue = null; activeCountry = null; activeLabels.include.length = 0; activeLabels.exclude.length = 0; rangeFilters = {}; Object.keys(textFilters).forEach(k => textFilters[k] = ''); renderFilters(); renderRangeFilters(); renderGrid(); };
    fr.appendChild(btn);
  } else if (!hasAnyFilter() && existing) {
    existing.remove();
  }
}

function buildDropdown(id, label, options, selected) {
  const hasSel = selected.length > 0 && selected[0] !== '';
  let selLabel = label;
  if (hasSel) {
    const names = selected.map(s => { const o = options.find(x => x.value === s); return o ? o.label : s }).filter(Boolean);
    selLabel = names.length <= 2 ? names.join(', ') : names.slice(0, 2).join(', ') + ' +' + (names.length - 2);
  }
  let html = `<div class="filter-dropdown" id="${id}">`;
  html += `<button class="filter-dropdown-btn${hasSel ? ' has-selection' : ''}">${selLabel}<svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></button>`;
  html += `<div class="filter-dropdown-panel">`;
  options.forEach(o => {
    const active = selected.includes(o.value);
    html += `<button class="filter-option${active ? ' active' : ''}" data-value="${o.value}"><span class="filter-checkbox"></span>${o.label}${o.count != null ? '<span class="filter-option-count">' + o.count + '</span>' : ''}</button>`;
  });
  html += `</div></div>`;
  return html;
}

function buildLabelDropdown(id, label, options, includeList, excludeList) {
  const hasSel = includeList.length > 0 || excludeList.length > 0;
  let selLabel = label;
  if (hasSel) {
    const parts = [];
    if (includeList.length) parts.push('+' + includeList.length);
    if (excludeList.length) parts.push('-' + excludeList.length);
    selLabel = label + ' (' + parts.join(', ') + ')';
  }
  let html = `<div class="filter-dropdown" id="${id}">`;
  html += `<button class="filter-dropdown-btn${hasSel ? ' has-selection' : ''}">${selLabel}<svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></button>`;
  html += `<div class="filter-dropdown-panel">`;
  options.forEach(o => {
    const isIncluded = includeList.includes(o.value);
    const isExcluded = excludeList.includes(o.value);
    const cls = isIncluded ? ' included' : (isExcluded ? ' excluded' : '');
    html += `<div class="filter-option${cls}" data-value="${o.value}"><span class="filter-checkbox"></span>${o.label}<div class="label-toggle"><button class="label-toggle-btn${isIncluded ? ' active-include' : ''}" data-action="include" data-label="${o.value}">+</button><button class="label-toggle-btn${isExcluded ? ' active-exclude' : ''}" data-action="exclude" data-label="${o.value}">&minus;</button></div></div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderFilters() {
  const fr = document.getElementById('filterRow');
  const base = activeVenue ? allGirls.filter(g => g.venue === activeVenue) : allGirls;

  // Venue options
  const venueOpts = [];
  VENUES.forEach(v => { venueOpts.push({ value: v.id, label: v.name, count: allGirls.filter(g => g.venue === v.id).length }) });
  const venueSelected = activeVenue ? [activeVenue] : [];

  // Country options
  const countryCounts = {};
  base.forEach(g => {
    (Array.isArray(g.country) ? g.country : (g.country ? [g.country] : [])).forEach(c => { countryCounts[c] = (countryCounts[c] || 0) + 1 });
  });
  const countryOpts = Object.keys(countryCounts).sort((a, b) => a.localeCompare(b)).map(c => ({ value: c, label: c, count: countryCounts[c] }));
  const countrySelected = activeCountry ? [activeCountry] : [];

  // Label options
  const labelCounts = {};
  base.forEach(g => { (g.labels || []).forEach(l => { labelCounts[l] = (labelCounts[l] || 0) + 1 }) });
  const labelOpts = Object.keys(labelCounts).sort((a, b) => a.localeCompare(b)).map(l => ({ value: l, label: l, count: labelCounts[l] }));

  fr.innerHTML = buildDropdown('ddVenue', 'Venue', venueOpts, venueSelected)
    + buildDropdown('ddCountry', 'Country', countryOpts, countrySelected)
    + buildLabelDropdown('ddLabels', 'Services', labelOpts, activeLabels.include, activeLabels.exclude)
    + (hasAnyFilter() ? '<button class="clear-all-btn" id="clearAllBtn">Clear All</button>' : '');

  // Text filter inputs in More Filters panel
  const mfd = document.getElementById('moreFiltersDropdowns');
  const tfDefs = [
    { key: 'name', placeholder: 'Name' },
    { key: 'exp', placeholder: 'Experience' },
    { key: 'special', placeholder: 'Special' },
    { key: 'lang', placeholder: 'Language' },
    { key: 'type', placeholder: 'Type' },
    { key: 'desc', placeholder: 'Description' }
  ];
  mfd.innerHTML = tfDefs.map(d => '<input type="text" class="search-input" data-tf="' + d.key + '" placeholder="' + d.placeholder + '..." autocomplete="off" value="' + (textFilters[d.key] || '').replace(/"/g, '&quot;') + '">').join('');
  mfd.querySelectorAll('.search-input').forEach(inp => {
    inp.addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { textFilters[inp.dataset.tf] = e.target.value.trim(); renderGrid(); updateClearBtn(); }, 200);
    });
  });

  // Bind dropdown toggles
  fr.querySelectorAll('.filter-dropdown-btn').forEach(btn => {
    btn.onclick = e => { e.stopPropagation(); closeAllDropdowns(btn); btn.classList.toggle('open'); btn.nextElementSibling.classList.toggle('open') };
  });

  // Venue options
  document.querySelectorAll('#ddVenue .filter-option').forEach(opt => {
    opt.onclick = e => { e.stopPropagation(); const v = opt.dataset.value || null; activeVenue = (activeVenue === v) ? null : v; renderFilters(); renderGrid(); };
  });

  // Country options
  document.querySelectorAll('#ddCountry .filter-option').forEach(opt => {
    opt.onclick = e => { e.stopPropagation(); activeCountry = activeCountry === opt.dataset.value ? null : opt.dataset.value; renderFilters(); renderGrid(); };
  });

  // Label options (+/- toggle)
  document.querySelectorAll('#ddLabels .label-toggle-btn').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const label = btn.dataset.label;
      const action = btn.dataset.action;
      const incIdx = activeLabels.include.indexOf(label);
      const excIdx = activeLabels.exclude.indexOf(label);
      // Remove from both first
      if (incIdx >= 0) activeLabels.include.splice(incIdx, 1);
      if (excIdx >= 0) activeLabels.exclude.splice(excIdx, 1);
      // Toggle: if was already active for this action, just remove (done above); otherwise add
      if (action === 'include' && incIdx < 0) activeLabels.include.push(label);
      else if (action === 'exclude' && excIdx < 0) activeLabels.exclude.push(label);
      renderFilters(); renderGrid();
    };
  });

  // Clear all filters
  const clearBtn = document.getElementById('clearAllBtn');
  if (clearBtn) {
    clearBtn.onclick = () => { activeVenue = null; activeCountry = null; activeLabels.include.length = 0; activeLabels.exclude.length = 0; rangeFilters = {}; Object.keys(textFilters).forEach(k => textFilters[k] = ''); renderFilters(); renderRangeFilters(); renderGrid(); };
  }

  // Sort row (dropdown + direction toggle)
  const sr = document.getElementById('sortRow');
  const sorts = [
    { id: 'name', label: 'Name' },
    { id: 'age', label: 'Age' },
    { id: 'body', label: 'Body' },
    { id: 'height', label: 'Height' },
    { id: 'cup', label: 'Cup' },
    { id: 'val1', label: '30 Min' },
    { id: 'val2', label: '45 Min' },
    { id: 'val3', label: '60 Min' },
    { id: 'startDate', label: 'Start Date' },
    { id: 'lastRostered', label: 'Last Rostered' }
  ];
  const activeSortLabel = sorts.find(s => s.id === activeSort)?.label || 'Name';
  const sortOpts = sorts.map(s => ({ value: s.id, label: s.label }));
  sr.innerHTML = buildDropdown('ddSort', activeSortLabel, sortOpts, [activeSort])
    + `<button class="sort-dir-btn ${sortDir}" id="sortDirBtn" title="${sortDir === 'asc' ? 'Ascending' : 'Descending'}"><svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>${sortDir === 'asc' ? 'ASC' : 'DESC'}</button>`;

  // Sort dropdown toggle
  const sortBtn = sr.querySelector('.filter-dropdown-btn');
  sortBtn.onclick = e => { e.stopPropagation(); closeAllDropdowns(sortBtn); sortBtn.classList.toggle('open'); sortBtn.nextElementSibling.classList.toggle('open') };

  // Sort options
  document.querySelectorAll('#ddSort .filter-option').forEach(opt => {
    opt.onclick = e => { e.stopPropagation(); activeSort = opt.dataset.value; closeAllDropdowns(); renderFilters(); renderGrid(); };
  });

  // Direction toggle
  document.getElementById('sortDirBtn').onclick = () => { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; renderFilters(); renderGrid(); };
}

function renderRangeFilters() {
  const grid = document.getElementById('rangeFiltersGrid');
  grid.innerHTML = '';
  RANGE_DEFS.forEach(def => {
    let vals = [];
    allGirls.forEach(g => {
      const raw = g[def.field];
      if (!raw && raw !== 0) return;
      if (def.type === 'num') { const n = parseFloat(raw); if (!isNaN(n)) vals.push(n); }
      else if (def.type === 'cup') { const n = cupToNum(raw); if (n >= 0) vals.push(n); }
      else if (def.type === 'date') { const n = dateToNum(raw); if (!isNaN(n)) vals.push(n); }
    });
    if (vals.length < 2) return;
    const dataMin = Math.min(...vals), dataMax = Math.max(...vals);
    if (dataMin === dataMax) return;
    rangeDefaults[def.key] = { min: dataMin, max: dataMax };
    const rf = rangeFilters[def.key] || { min: dataMin, max: dataMax };
    if (rf.min < dataMin) rf.min = dataMin;
    if (rf.max > dataMax) rf.max = dataMax;

    const fmt = v => {
      if (def.type === 'cup') return numToCup(v);
      if (def.type === 'date') return numToDate(v);
      return (def.prefix || '') + Math.round(v) + (def.suffix || '');
    };

    const isActive = rf.min > dataMin || rf.max < dataMax;
    const wrap = document.createElement('div');
    wrap.className = 'range-filter';
    wrap.innerHTML = `
      <div class="range-filter-label"><span>${def.label}</span><span>${fmt(rf.min)} – ${fmt(rf.max)}</span></div>
      <div class="range-slider">
        <div class="range-slider-track"></div>
        <div class="range-slider-fill" id="fill_${def.key}"></div>
        <input type="range" min="${dataMin}" max="${dataMax}" value="${rf.min}" step="${def.type === 'date' ? 86400000 : 1}" data-handle="min" data-key="${def.key}">
        <input type="range" min="${dataMin}" max="${dataMax}" value="${rf.max}" step="${def.type === 'date' ? 86400000 : 1}" data-handle="max" data-key="${def.key}">
      </div>`;
    grid.appendChild(wrap);

    // Position fill bar
    const fillPct = v => ((v - dataMin) / (dataMax - dataMin)) * 100;
    const fill = wrap.querySelector(`#fill_${def.key}`);
    fill.style.left = fillPct(rf.min) + '%';
    fill.style.right = (100 - fillPct(rf.max)) + '%';

    // Bind inputs
    wrap.querySelectorAll('input[type=range]').forEach(inp => {
      const update = () => {
        const handle = inp.dataset.handle;
        let v = parseFloat(inp.value);
        const other = wrap.querySelector(`input[data-handle="${handle === 'min' ? 'max' : 'min'}"]`);
        if (handle === 'min' && v > parseFloat(other.value)) { v = parseFloat(other.value); inp.value = v; }
        if (handle === 'max' && v < parseFloat(other.value)) { v = parseFloat(other.value); inp.value = v; }
        if (!rangeFilters[def.key]) rangeFilters[def.key] = { min: dataMin, max: dataMax };
        rangeFilters[def.key][handle] = v;
        fill.style.left = fillPct(rangeFilters[def.key].min) + '%';
        fill.style.right = (100 - fillPct(rangeFilters[def.key].max)) + '%';
        wrap.querySelector('.range-filter-label span:last-child').textContent = fmt(rangeFilters[def.key].min) + ' \u2013 ' + fmt(rangeFilters[def.key].max);
      };
      inp.addEventListener('input', update);
      inp.addEventListener('change', () => { update(); renderFilters(); renderGrid(); });
    });
  });
}

function getFiltered() {
  let list = [...allGirls];
  if (activeVenue) list = list.filter(g => g.venue === activeVenue);
  if (activeCountry) list = list.filter(g => {
    const countries = Array.isArray(g.country) ? g.country : (g.country ? [g.country] : []);
    return countries.includes(activeCountry);
  });
  if (activeLabels.include.length) list = list.filter(g => {
    const gl = g.labels || [];
    return activeLabels.include.every(l => gl.some(lb => lb.toLowerCase() === l.toLowerCase()));
  });
  if (activeLabels.exclude.length) list = list.filter(g => {
    const gl = g.labels || [];
    return activeLabels.exclude.every(l => !gl.some(lb => lb.toLowerCase() === l.toLowerCase()));
  });
  // Range filters
  RANGE_DEFS.forEach(def => {
    const rf = rangeFilters[def.key];
    if (!rf) return;
    list = list.filter(g => {
      const raw = g[def.field];
      if (!raw && raw !== 0) return true; // no data = pass through
      let v;
      if (def.type === 'num') v = parseFloat(raw);
      else if (def.type === 'cup') v = cupToNum(raw);
      else if (def.type === 'date') v = dateToNum(raw);
      if (isNaN(v) || v < 0) return true;
      return v >= rf.min && v <= rf.max;
    });
  });
  // Text filters
  const tfMap = { name: 'name', exp: 'exp', special: 'special', lang: 'lang', type: 'type', desc: 'desc' };
  Object.entries(tfMap).forEach(([key, field]) => {
    const q = (textFilters[key] || '').toLowerCase();
    if (!q) return;
    list = list.filter(g => (g[field] || '').toLowerCase().includes(q));
  });
  // Sort
  const dir = sortDir === 'desc' ? -1 : 1;
  const emptyLast = (a, b, cmp) => {
    const an = (a.name || '').trim(), bn = (b.name || '').trim();
    if (!an && !bn) return 0; if (!an) return 1; if (!bn) return -1;
    return cmp(a, b) * dir;
  };
  if (activeSort === 'age') list.sort((a, b) => emptyLast(a, b, () => (parseFloat(a.age) || 999) - (parseFloat(b.age) || 999)));
  else if (activeSort === 'body') list.sort((a, b) => emptyLast(a, b, () => (parseFloat(a.body) || 999) - (parseFloat(b.body) || 999)));
  else if (activeSort === 'height') list.sort((a, b) => emptyLast(a, b, () => (parseFloat(a.height) || 999) - (parseFloat(b.height) || 999)));
  else if (activeSort === 'cup') list.sort((a, b) => emptyLast(a, b, () => (a.cup || '').toLowerCase().localeCompare((b.cup || '').toLowerCase())));
  else if (activeSort === 'val1') list.sort((a, b) => emptyLast(a, b, () => (parseFloat(a.val1) || 999) - (parseFloat(b.val1) || 999)));
  else if (activeSort === 'val2') list.sort((a, b) => emptyLast(a, b, () => (parseFloat(a.val2) || 999) - (parseFloat(b.val2) || 999)));
  else if (activeSort === 'val3') list.sort((a, b) => emptyLast(a, b, () => (parseFloat(a.val3) || 999) - (parseFloat(b.val3) || 999)));
  else if (activeSort === 'startDate') list.sort((a, b) => emptyLast(a, b, () => (a.startDate || '').localeCompare(b.startDate || '')));
  else if (activeSort === 'lastRostered') list.sort((a, b) => emptyLast(a, b, () => (a.lastRostered || '').localeCompare(b.lastRostered || '')));
  else list.sort((a, b) => emptyLast(a, b, () => (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase())));
  return list;
}

function renderGrid() {
  const grid = document.getElementById('girlsGrid');
  const filtered = getFiltered();

  document.getElementById('resultCount').textContent = filtered.length + ' girl' + (filtered.length !== 1 ? 's' : '') + ' found';

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-msg">No girls match your filters.</div>';
    return;
  }

  grid.innerHTML = '';
  filtered.forEach((g, i) => {
    const el = document.createElement('div');
    el.className = 'girl-card';
    const img = g.photos && g.photos.length
      ? `<img class="card-thumb" src="${g.photos[0]}" alt="${(g.name || '').replace(/"/g, '&quot;')}" loading="lazy">`
      : '<div class="silhouette"></div>';
    const countries = Array.isArray(g.country) ? g.country.join(', ') : (g.country || '');

    const lastRostered = g.lastRostered ? (() => {
      const diff = Math.round((Date.now() - new Date(g.lastRostered + 'T00:00:00')) / 86400000);
      if (diff === 0) return 'Last rostered: Today';
      if (diff === 1) return 'Last rostered: Yesterday';
      if (diff > 0) return 'Last rostered: ' + diff + ' days ago';
      return '';
    })() : '';

    el.innerHTML = `
      <div class="card-img">${img}</div>
      <div class="card-info">
        <div class="card-name">${g.name || ''}</div>
        <div class="card-venue ${g.venue}">${g.venueName}</div>
        <div class="card-country">${countries}</div>
        ${g.special ? '<div class="card-special">' + g.special + '</div>' : ''}
        <div class="card-stats">
          ${g.age ? '<span>Age ' + g.age + '</span>' : ''}
          ${g.body ? '<span>Body ' + g.body + '</span>' : ''}
          ${g.height ? '<span>' + g.height + 'cm</span>' : ''}
          ${g.cup ? '<span>' + g.cup + ' cup</span>' : ''}
        </div>
        ${(g.val1 || g.val2 || g.val3) ? '<div class="card-rates">' + [g.val1 ? '30m $'+g.val1 : '', g.val2 ? '45m $'+g.val2 : '', g.val3 ? '60m $'+g.val3 : ''].filter(Boolean).join(' / ') + '</div>' : ''}
        ${lastRostered ? '<div class="card-last-rostered">' + lastRostered + '</div>' : ''}
        <div class="card-hover-line"></div>
      </div>`;
    el.onclick = () => showProfile(g);
    if (g.photos && g.photos.length > 1) {
      let hoverInterval = null, hoverIdx = 0;
      const thumb = () => el.querySelector('.card-thumb');
      el.addEventListener('mouseenter', () => {
        hoverIdx = 0;
        hoverInterval = setInterval(() => {
          hoverIdx = (hoverIdx + 1) % g.photos.length;
          const img = thumb();
          if (img) img.src = g.photos[hoverIdx];
        }, 2000);
      });
      el.addEventListener('mouseleave', () => {
        clearInterval(hoverInterval);
        const img = thumb();
        if (img) img.src = g.photos[0];
      });
    }
    grid.appendChild(el);
  });
}

function showProfile(g) {
  const overlay = document.getElementById('profileOverlay');
  const panel = document.getElementById('profilePanel');
  const countries = Array.isArray(g.country) ? g.country.join(', ') : (g.country || '');
  const photos = g.photos || [];
  const mainImg = photos.length ? photos[0] : '';

  panel.innerHTML = `
    <button class="profile-close" onclick="closeProfile()">&times;</button>
    <div class="card-venue ${g.venue}" style="margin-bottom:12px">${g.venueName}</div>
    <div class="profile-name">${g.name || ''}</div>
    <div class="profile-layout">
      <div class="profile-gallery">
        <img id="profileMainImg" src="${mainImg}" alt="${(g.name || '').replace(/"/g, '&quot;')}" style="${!mainImg ? 'display:none' : ''}">
        <div class="profile-thumbs">
          ${photos.map((p, i) => `<img src="${p}" alt="" class="${i === 0 ? 'active' : ''}" onclick="selectProfilePhoto(${i})">`).join('')}
        </div>
      </div>
      <div>
        <div class="profile-detail">
          ${detailRow('Country', countries)}
          ${detailRow('Age', g.age)}
          ${detailRow('Body', g.body)}
          ${detailRow('Height', g.height ? g.height + ' cm' : '')}
          ${detailRow('Cup', g.cup)}
          ${detailRow('30 min', g.val1 ? '$' + g.val1 : '')}
          ${detailRow('45 min', g.val2 ? '$' + g.val2 : '')}
          ${detailRow('60 min', g.val3 ? '$' + g.val3 : '')}
          ${detailRow('Start Date', g.startDate)}
          ${detailRow('Last Rostered', g.lastRostered)}
          ${detailRow('Experience', g.exp)}
          ${detailRow('Special', g.special)}
          ${detailRow('Language', g.lang)}
          ${detailRow('Type', g.type)}
          ${g.oldUrl ? '<div class="profile-detail-row"><span>Reference</span><span><a href="' + g.oldUrl + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">' + g.oldUrl + '</a></span></div>' : ''}
        </div>
        ${g.desc ? '<div class="profile-desc">' + g.desc + '</div>' : ''}
        ${g.labels && g.labels.length ? '<div class="card-labels">' + g.labels.map(l => '<span class="card-label">' + l + '</span>').join('') + '</div>' : ''}
      </div>
    </div>`;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';

  // Auto-rotate profile photos
  clearInterval(window._profileRotate);
  window._profilePhotos = photos;
  window._profilePhotoIdx = 0;
  if (photos.length > 1) {
    window._profileRotate = setInterval(() => {
      window._profilePhotoIdx = (window._profilePhotoIdx + 1) % photos.length;
      const img = document.getElementById('profileMainImg');
      if (img) img.src = photos[window._profilePhotoIdx];
      document.querySelectorAll('.profile-thumbs img').forEach((t, i) => t.classList.toggle('active', i === window._profilePhotoIdx));
    }, 2000);
  }
}

function detailRow(label, value) {
  if (!value) return '';
  return `<div class="profile-detail-row"><span>${label}</span><span>${value}</span></div>`;
}

function selectProfilePhoto(idx) {
  window._profilePhotoIdx = idx;
  const photos = window._profilePhotos || [];
  const img = document.getElementById('profileMainImg');
  if (img && photos[idx]) img.src = photos[idx];
  document.querySelectorAll('.profile-thumbs img').forEach((t, i) => t.classList.toggle('active', i === idx));
}

function closeProfile() {
  clearInterval(window._profileRotate);
  document.getElementById('profileOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// Close profile on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeProfile() });
document.getElementById('profileOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeProfile();
});


// Back to top
const btt = document.getElementById('backToTop');
window.addEventListener('scroll', () => {
  btt.classList.toggle('visible', window.scrollY > 400);
});
btt.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

// More filters toggle
document.getElementById('moreFiltersToggle').onclick = function() {
  this.classList.toggle('open');
  document.getElementById('moreFiltersPanel').classList.toggle('open');
};

// Init
loadProfiles();
</script>
